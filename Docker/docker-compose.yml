services:

  backend:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    env_file:
      - ../.env

  frontend:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend